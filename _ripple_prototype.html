<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ripple Prototype — Tapa Delay</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Tom de cinza mais escuro */
  :root {
    --bg: #1a1a1c;
  }

  /* ---- Cabeçalho separado em duas fileiras: title-bar (logo + janela)
     e nav-bar (Delay/Streaming/Settings) ---- */
  .app-header-split {
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid var(--line);
  }
  .title-bar {
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px 0 12px;
    background: linear-gradient(180deg, #343438 0%, #2d2d30 100%);
    -webkit-app-region: drag;
  }
  .title-bar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .title-bar .win-btn {
    width: 22px;
    height: 22px;
  }
  .title-bar .win-btn svg {
    width: 11px;
    height: 11px;
  }
  .title-bar .window-controls {
    gap: 2px;
  }
  .title-bar .connection {
    font-size: 11px;
  }
  .brand-logo {
    position: relative;
    display: flex;
    align-items: center;
    height: 26px;
    width: 27px;
    overflow: hidden;
    transition: width 0.35s ease;
    cursor: default;
  }
  .brand-logo:hover {
    width: 118px;
  }
  .brand-logo img {
    height: 100%;
    width: 118px;
    flex: none;
    display: block;
    opacity: 1;
    transition: opacity 0.35s ease;
  }
  .brand-logo-thanks {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    white-space: nowrap;
    font-size: 12px;
    font-weight: 700;
    color: #5b7cff;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .brand-logo.thanked,
  .brand-logo.thanked:hover {
    width: 260px;
    cursor: default;
  }
  .brand-logo.thanked img {
    opacity: 0;
  }
  .brand-logo.thanked .brand-logo-thanks {
    opacity: 1;
  }
  .nav-bar {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #232326;
  }
  .nav-bar .nav-item {
    height: 28px;
    min-width: 76px;
    padding: 0 12px;
    font-size: 12px;
  }
  .nav-bar .nav-item.active {
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }
  .nav-bar .nav-item svg {
    width: 14px;
    height: 14px;
  }
  .nav-bar .nav {
    gap: 10px;
  }

  /* Presets sem o nome (Live/Short/Medium/Long) — só número maior + descrição */
  .btn-time {
    font-size: 42px;
  }
  .btn-delay {
    gap: 8px;
  }

  /* Efeito do uiverse.io/Samalander0/sweet-eel-98: no hover o card encolhe
     um pouco e o texto dentro encolhe um pouco mais (sensação de profundidade) */
  .btn-delay {
    transition: transform 0.3s ease, border 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-delay:hover {
    transform: scale(0.97);
  }
  .btn-delay:active {
    transform: scale(0.93);
  }
  .btn-delay .btn-time,
  .btn-delay small {
    display: inline-block;
    transition: transform 0.3s ease;
  }
  .btn-delay:hover small {
    transform: scale(0.93);
  }
  .btn-delay:hover .btn-time {
    transform: scale(1.18);
  }

  /* Mesmo efeito no número principal (Current Delay), pra sinalizar que é
     uma área editável: número cresce, "sec" e o rótulo encolhem levemente */
  .delay-readout {
    pointer-events: auto;
    cursor: pointer;
  }
  .eyebrow,
  #currentDelayDisplay,
  #delayUnit {
    display: inline-block;
    transition: transform 0.3s ease;
  }
  #currentDelayDisplay {
    /* o número é right-aligned num box de min-width:150px (CSS real do app) —
       sem isso o scale cresce a partir do centro do box vazio, não do dígito,
       e parece "puxar" pra direita */
    transform-origin: right center;
  }
  .delay-readout:hover #currentDelayDisplay {
    transform: scale(1.18);
  }
  .delay-readout:hover #delayUnit {
    transform: scale(0.9);
  }
  .delay-hero:has(.delay-readout:hover) .eyebrow {
    transform: scale(0.9);
  }

  /* ---- Protótipo do Background Ripple Effect, cores do Tapa Delay ---- */
  .ripple-layer {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .ripple-grid {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: auto;
    mask-image: radial-gradient(ellipse 65% 65% at 50% 40%, black 25%, transparent 78%);
    -webkit-mask-image: radial-gradient(ellipse 65% 65% at 50% 40%, black 25%, transparent 78%);
  }
  .ripple-cell {
    border: 0.5px solid rgba(90, 90, 98, 0.35);
    background: rgba(91, 124, 255, 0.035);
    opacity: 0.5;
    transition: opacity 0.15s ease, background 0.15s ease;
    will-change: opacity;
  }
  .ripple-cell:hover {
    opacity: 1;
    background: rgba(91, 124, 255, 0.14);
  }
  .ripple-cell.rippling {
    animation: cell-ripple var(--duration, 200ms) ease-out var(--delay, 0ms);
  }
  @keyframes cell-ripple {
    0%   { opacity: 0.5; background: rgba(91, 124, 255, 0.035); box-shadow: none; }
    45%  { opacity: 1; background: rgba(91, 124, 255, 0.3); box-shadow: 0 0 16px 1px rgba(91, 124, 255, 0.35) inset; }
    100% { opacity: 0.5; background: rgba(91, 124, 255, 0.035); box-shadow: none; }
  }

  /* Garante que o conteúdo real fique por cima do ripple, e deixa a área de
     conteúdo transparente pra o ripple (que fica atrás) aparecer */
  .app-header-split, .pages-container { position: relative; z-index: 1; }
  .pages-container, .page { background: transparent; }
  .app-shell { position: relative; background: var(--bg); }

  /* Wrappers vazios (sem conteúdo próprio) deixam o clique passar direto pro
     ripple atrás. Reativa o clique só nos elementos que realmente precisam. */
  .pages-container, .page, .page.active, .delay-hero {
    pointer-events: none;
  }
  .round-action,
  .presets-section,
  .status-pills,
  .nav-item,
  .win-btn {
    pointer-events: auto;
  }

  /* Barra de controle do protótipo (não faz parte do app) */
  .proto-note {
    position: fixed;
    bottom: 8px;
    left: 8px;
    z-index: 99;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font: 11px monospace;
    padding: 4px 8px;
    border-radius: 6px;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="app-shell">
    <div class="ripple-layer" id="rippleLayer"></div>

    <header class="app-header-split">
      <div class="title-bar">
        <div class="brand-logo" id="brandLogo">
          <img src="assets/logo-wordmark.svg" alt="Tapa Delay">
          <span class="brand-logo-thanks">obrigado por participar do beta =)</span>
        </div>
        <div class="title-bar-right">
          <div class="connection"><span class="status-dot active"></span><span id="statusText">Live</span></div>
          <div class="window-controls">
            <button class="win-btn"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <button class="win-btn"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><rect x="5" y="5" width="14" height="14" rx="2"/></svg></button>
            <button class="win-btn close"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
          </div>
        </div>
      </div>
      <div class="nav-bar">
        <nav class="nav">
          <button class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg><span>Delay</span></button>
          <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12a7 7 0 0 1 14 0"/><path d="M8 12a4 4 0 0 1 8 0"/><circle cx="12" cy="12" r="1.5"/></svg><span>Streaming</span></button>
          <button class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg><span>Settings</span></button>
        </nav>
      </div>
    </header>

    <main class="pages-container">
      <section class="page active" id="delayPage">
        <div class="delay-hero">
          <span class="eyebrow">Current Delay</span>
          <div class="delay-center-row">
            <button class="round-action side-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></svg></button>
            <div class="delay-readout"><span id="currentDelayDisplay">0</span><em id="delayUnit">sec</em></div>
            <button class="round-action side-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="8 5 19 12 8 19 8 5"/></svg></button>
          </div>
        </div>
        <section class="presets-section">
          <h2>Quick Presets</h2>
          <div class="controls-grid">
            <button class="btn-delay active"><span class="checkmark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span><span class="btn-time live">0</span><small>No delay</small></button>
            <button class="btn-delay"><span class="checkmark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span><span class="btn-time short">20</span><small>20 seconds</small></button>
            <button class="btn-delay"><span class="checkmark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span><span class="btn-time medium">33</span><small>33 seconds</small></button>
            <button class="btn-delay"><span class="checkmark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span><span class="btn-time long">60</span><small>1 minute</small></button>
          </div>
        </section>
        <div class="status-pills">
          <div class="pill">Uptime: <strong>00:12:04</strong></div>
          <div class="pill">Bitrate: <strong>8000 kbps</strong></div>
        </div>
      </section>
    </main>
  </div>

  <div class="proto-note">protótipo — clique no fundo pra ver o ripple</div>

  <script>
    function initRipple(container, cellSize) {
      const rect = container.getBoundingClientRect();
      const cols = Math.ceil((rect.width * 1.4) / cellSize);
      const rows = Math.ceil((rect.height * 1.4) / cellSize);
      const grid = document.createElement('div');
      grid.className = 'ripple-grid';
      grid.style.display = 'grid';
      grid.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
      grid.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
      grid.style.width = (cols * cellSize) + 'px';
      grid.style.height = (rows * cellSize) + 'px';

      const cells = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement('div');
          cell.className = 'ripple-cell';
          cell.dataset.row = r;
          cell.dataset.col = c;
          cell.addEventListener('click', () => triggerRipple(r, c));
          grid.appendChild(cell);
          cells.push(cell);
        }
      }
      container.appendChild(grid);

      function triggerRipple(row, col) {
        // 1ª passada: calcula delay/duration e tira a classe de todo mundo
        cells.forEach(cell => {
          const cr = +cell.dataset.row, cc = +cell.dataset.col;
          const dist = Math.hypot(row - cr, col - cc);
          const delay = Math.max(0, dist * 40);
          const duration = 220 + dist * 65;
          cell.style.setProperty('--delay', delay + 'ms');
          cell.style.setProperty('--duration', duration + 'ms');
          cell.classList.remove('rippling');
        });
        // 1 único reflow forçado pra grade inteira (em vez de 1 por célula,
        // que era o motivo do lag: centenas de recálculos de layout seguidos)
        void grid.offsetHeight;
        // 2ª passada: reaplica a classe, dispara a animação de todas de uma vez
        cells.forEach(cell => cell.classList.add('rippling'));
      }
    }
    initRipple(document.getElementById('rippleLayer'), 40);

    const brandLogo = document.getElementById('brandLogo');
    brandLogo.addEventListener('click', () => {
      brandLogo.classList.add('thanked');
    });
    brandLogo.addEventListener('mouseleave', () => {
      brandLogo.classList.remove('thanked');
    });
  </script>
</body>
</html>
